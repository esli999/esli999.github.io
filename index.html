<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="esli999 — personal site." />
    <title>esli999</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #0d1117;
        --muted: #57606a;
        --accent: #0969da;
        --bg: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #f0f4f8;
          --muted: #8b949e;
          --accent: #58a6ff;
          --bg: #0d1117;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      main {
        max-width: 22rem;
        text-align: center;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
      }
      p {
        color: var(--muted);
        margin: 0 0 1.5rem;
        font-size: 1rem;
      }
      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>esli999</h1>
      <p>Personal site — more here before long.</p>
      <p><a href="genmatter/">Genmatter</a></p>
    </main>
  </body>
</html>

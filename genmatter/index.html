<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Genmatter — test</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --fg: #e7ecf1;
        --muted: #8b98a5;
        --accent: #1d9bf0;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f7f9fa;
          --fg: #0f1419;
          --muted: #536471;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        color: var(--muted);
        margin: 0 0 1.5rem;
        max-width: 28rem;
        line-height: 1.5;
      }
      .badge {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 1rem;
      }
      img {
        width: min(280px, 80vw);
        height: auto;
        border-radius: 12px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
      }
    </style>
  </head>
  <body>
    <span class="badge">Project site</span>
    <h1>Genmatter test page</h1>
    <p>
      If you see this page and the image below, static hosting is working.
    </p>
    <img src="test-card.svg" alt="Test placeholder graphic" width="280" height="180" />
  </body>
</html>
